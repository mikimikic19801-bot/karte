<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Low Elite</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0c29">
    <style>
        :root {
            --bg: #0f0c29;
            --accent: #00d2ff;
            --neon: #9d50bb;
            --win: #00f2ff;
            --lose: #ff0055;
            --card-bg: #1a1a2e;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            color: white; margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { width: 100%; max-width: 450px; padding: 20px; box-sizing: border-box; text-align: center; }

        .stat-bar {
            display: flex; justify-content: space-between;
            background: rgba(255,255,255,0.05); padding: 15px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px; backdrop-filter: blur(10px);
        }

        .stat-val { font-weight: 900; color: var(--accent); font-size: 1.2rem; }
        .label { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; }

        .card-container {
            perspective: 1000px; margin: 30px auto;
            width: 160px; height: 230px;
        }

        .card {
            width: 100%; height: 100%;
            background: var(--card-bg);
            border-radius: 20px;
            border: 2px solid var(--neon);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-size: 60px; font-weight: 900;
            box-shadow: 0 0 30px rgba(157, 80, 187, 0.4);
            position: relative; transition: transform 0.4s;
        }

        .card-suit { font-size: 24px; position: absolute; top: 15px; left: 15px; }
        .card-suit-bottom { font-size: 24px; position: absolute; bottom: 15px; right: 15px; transform: rotate(180deg); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        
        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px;
            color: white; cursor: pointer; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center;
        }

        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn.high { border-bottom: 4px solid var(--win); }
        .btn.low { border-bottom: 4px solid var(--lose); }
        .btn-odds { font-size: 18px; font-weight: 800; color: var(--accent); margin-top: 5px; }

        .message { margin-top: 15px; font-size: 14px; min-height: 20px; color: #aaa; font-style: italic; }
        
        input {
            background: rgba(0,0,0,0.3); border: 1px solid #444;
            color: white; text-align: center; font-size: 20px;
            width: 100px; padding: 10px; border-radius: 10px; outline: none;
        }

        #collect-btn {
            margin-top: 20px; background: var(--win); border: none;
            padding: 15px 40px; border-radius: 15px; font-weight: 900;
            color: #000; cursor: pointer; box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(5px); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .lose-anim { animation: shake 0.3s ease; border-color: var(--lose) !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="stat-bar">
        <div><div class="label">Banka</div><div id="balance" class="stat-val">100.00</div></div>
        <div style="text-align: right;"><div class="label">Trenutni Dobitak</div><div id="profit" class="stat-val" style="color:white">0.00</div></div>
    </div>

    <div class="card-container">
        <div class="card" id="card">
            <div class="card-suit" id="suit-top">♠</div>
            <span id="card-val">8</span>
            <div class="card-suit-bottom" id="suit-bottom">♠</div>
        </div>
    </div>

    <div class="message" id="msg">Izaberi ulog i pogodi sledeću kartu!</div>

    <div style="margin-top: 10px;">
        <label class="label">Ulog</label><br>
        <input type="number" id="stake" value="10" oninput="checkStake()">
    </div>

    <div class="controls">
        <button id="btn-high" class="btn high" onclick="play('high')">
            <span class="label">VEĆA</span>
            <span id="odds-high" class="btn-odds">1.80</span>
        </button>
        <button id="btn-low" class="btn low" onclick="play('low')">
            <span class="label">MANJA</span>
            <span id="odds-low" class="btn-odds">1.80</span>
        </button>
    </div>

    <button onclick="collect()" id="collect-btn" style="display:none;">UZMI KEŠ</button>
</div>
